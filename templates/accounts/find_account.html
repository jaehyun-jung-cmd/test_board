{% extends 'base.html' %}
{% block title %}비밀번호 찾기{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h5 class="mb-0 font-weight-bold">비밀번호 찾기</h5>
      </div>
      <div class="card-body">
        <p class="text-muted">가입한 이메일 주소를 입력하시면 비밀번호 재설정 링크를 보내드립니다.</p>

        <form method="POST">
          {% csrf_token %}
          <div class="form-group">
            <label class="font-weight-bold">이메일</label>
            <input type="email" name="email" class="form-control"
                   placeholder="가입한 이메일을 입력하세요" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">재설정 링크 발송</button>
        </form>

        <hr>
        <div class="text-center">
          <a href="{% url 'accounts:login' %}">← 로그인으로 돌아가기</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
