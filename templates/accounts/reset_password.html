{% extends 'base.html' %}
{% block title %}비밀번호 재설정{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h5 class="mb-0 font-weight-bold">새 비밀번호 설정</h5>
      </div>
      <div class="card-body">
        <form method="POST">
          {% csrf_token %}

          <div class="form-group">
            <label class="font-weight-bold">새 비밀번호 <span class="text-danger">*</span></label>
            <input type="password" name="password"
                   class="form-control {% if errors.password %}is-invalid{% endif %}"
                   placeholder="영문+숫자 조합 8자 이상" required>
            {% if errors.password %}
              <div class="invalid-feedback">{{ errors.password }}</div>
            {% endif %}
          </div>

          <div class="form-group">
            <label class="font-weight-bold">비밀번호 확인 <span class="text-danger">*</span></label>
            <input type="password" name="password_confirm"
                   class="form-control {% if errors.password_confirm %}is-invalid{% endif %}"
                   placeholder="새 비밀번호를 다시 입력하세요" required>
            {% if errors.password_confirm %}
              <div class="invalid-feedback">{{ errors.password_confirm }}</div>
            {% endif %}
          </div>

          <button type="submit" class="btn btn-primary btn-block">비밀번호 변경</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
