{% extends 'base.html' %}
{% block title %}게시글 수정{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-header bg-white">
    <h5 class="mb-0 font-weight-bold">📝 게시글 수정</h5>
  </div>
  <div class="card-body">
    <form method="POST" id="post-form">
      {% csrf_token %}

      <div class="form-group">
        <label class="font-weight-bold">제목 <span class="text-danger">*</span></label>
        <input type="text" name="title"
               class="form-control {% if errors.title %}is-invalid{% endif %}"
               value="{{ post.title }}"
               required maxlength="200">
        {% if errors.title %}
          <div class="invalid-feedback">{{ errors.title }}</div>
        {% endif %}
      </div>

      <div class="form-group">
        <label class="font-weight-bold">내용 <span class="text-danger">*</span></label>
        <textarea id="content" name="content">{{ post.content|safe }}</textarea>
        {% if errors.content %}
          <div class="text-danger small mt-1">{{ errors.content }}</div>
        {% endif %}
      </div>

      <div class="d-flex justify-content-between mt-4">
        <a href="{% url 'board:post_detail' post.id %}" class="btn btn-secondary">← 취소</a>
        <button type="submit" class="btn btn-primary px-4">저장</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
$(document).ready(function () {
  $('#content').summernote({
    lang: 'ko-KR',
    height: 350,
    toolbar: [
      ['style', ['style']],
      ['font', ['bold', 'italic', 'underline', 'strikethrough', 'clear']],
      ['fontsize', ['fontsize']],
      ['color', ['color']],
      ['para', ['ul', 'ol', 'paragraph']],
      ['table', ['table']],
      ['insert', ['link', 'picture', 'hr']],
      ['view', ['fullscreen', 'codeview', 'help']],
    ],
  });

  $('#post-form').on('submit', function () {
    var content = $('#content').summernote('code');
    if (!content || content === '<p><br></p>') {
      alert('내용을 입력해주세요.');
      return false;
    }
  });
});
</script>
{% endblock %}
