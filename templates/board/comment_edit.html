{% extends 'base.html' %}
{% block title %}댓글 수정{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h5 class="mb-0 font-weight-bold">💬 댓글 수정</h5>
      </div>
      <div class="card-body">
        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}

          <div class="form-group">
            <label class="font-weight-bold">내용 <span class="text-danger">*</span></label>
            <textarea name="content" class="form-control" rows="4"
                      required>{{ comment.content }}</textarea>
          </div>

          <div class="form-group">
            <label class="font-weight-bold">비밀번호 <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control"
                   placeholder="댓글 작성 시 입력한 비밀번호" required>
          </div>

          <div class="d-flex justify-content-between">
            <a href="{% url 'board:post_detail' post_id %}" class="btn btn-secondary">← 취소</a>
            <button type="submit" class="btn btn-primary">수정 완료</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
