<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}게시판{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css">
  {% block extra_head %}{% endblock %}
  <style>
    body { background-color: #f5f5f5; }
    .post-content img { max-width: 100%; height: auto; }
    .post-content { min-height: 200px; line-height: 1.8; }
    .pagination { justify-content: center; }
    .table td, .table th { vertical-align: middle; }
    .badge-info { font-size: 0.75em; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand font-weight-bold" href="{% url 'board:post_list' %}">📋 게시판</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="메뉴 열기">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'board:post_list' %}">게시판</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'stocks:index' %}">주식조회</a>
        </li>
      </ul>
      <div class="d-flex align-items-center">
        {% if current_user %}
          <span class="navbar-text text-white mr-3">{{ current_user.nickname }}님</span>
          <form method="POST" action="{% url 'accounts:logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
          </form>
        {% else %}
          <a href="{% url 'accounts:login' %}" class="btn btn-outline-light btn-sm mr-2">로그인</a>
          <a href="{% url 'accounts:signup' %}" class="btn btn-light btn-sm">회원가입</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>

<div class="container mt-4 mb-5">
  {% include 'includes/alerts.html' %}

  {% block content %}{% endblock %}
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/lang/summernote-ko-KR.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
